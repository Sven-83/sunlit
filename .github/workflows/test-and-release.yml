name: Test and Release

# Run tests on every push/PR to main, and release when a new tag is pushed.
on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:

jobs:
  # ---------------------------------------------------------------------
  # Cheap fast-path: lint + type-check on a single Node version.
  # Saves matrix minutes when the obvious things are broken.
  # ---------------------------------------------------------------------
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Audit production dependencies
        # Fail on high or critical vulnerabilities in production deps.
        # Dev-deps are excluded — they don't ship to users.
        run: npm audit --omit=dev --audit-level=high

  # ---------------------------------------------------------------------
  # Unit + package tests across the supported Node range and OS matrix.
  # ---------------------------------------------------------------------
  unit-tests:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    needs: [check-and-lint]
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

      - name: Run package tests
        run: npm run test:package

  # ---------------------------------------------------------------------
  # Integration test - boots a real ioBroker instance.
  # Linux only (the harness has known issues on Windows runners).
  # ---------------------------------------------------------------------
  adapter-tests:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    needs: [check-and-lint]
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration

  # ---------------------------------------------------------------------
  # Deploy on tag pushes (vX.Y.Z). Publishes to npm and creates a
  # GitHub release. Requires NPM_TOKEN secret.
  # ---------------------------------------------------------------------
  deploy:
    needs: [unit-tests, adapter-tests]
    if: |
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
          registry-url: "https://registry.npmjs.org/"

      - name: Extract release notes
        id: extract_release
        uses: ffurrer2/extract-release-notes@v3
        with:
          changelog_file: CHANGELOG.md

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ github.ref_name }}
          body: ${{ steps.extract_release.outputs.release_notes }}
